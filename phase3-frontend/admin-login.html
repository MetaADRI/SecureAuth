<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SecureAuth</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23003366%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z%22/></svg>">
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cuz-blue': '#003366',
                        'cuz-blue-light': '#0066CC',
                        'cuz-blue-dark': '#002244',
                        'metallic': '#6C757D',
                        'light-gray': '#F8F9FA',
                        'dark-gray': '#343A40',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .input-focus:focus {
            border-color: #003366;
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }
        
        .btn-scale {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn-scale:hover {
            transform: scale(1.02);
        }
        
        .btn-scale:active {
            transform: scale(0.98);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s ease;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Admin Header -->
        <div class="text-center mb-10">
            <div class="inline-flex flex-col items-center">
                <div class="w-20 h-20 rounded-3xl flex items-center justify-center mb-4 shadow-2xl bg-white">
                    <i data-lucide="shield-alert" class="w-12 h-12 text-cuz-blue"></i>
                </div>
                <div class="bg-cuz-blue-light/20 text-cuz-blue-light px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-3 border border-cuz-blue-light/30">
                    Restricted Access
                </div>
                <h1 class="text-3xl font-black text-white tracking-tight">Admin Portal</h1>
                <p class="text-slate-400 mt-2 font-medium text-sm">System authentication required</p>
            </div>
        </div>
        
        <!-- Login Card -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl p-10">
            <!-- Login Form -->
            <form id="adminLoginForm" class="space-y-6">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">
                        Admin Email
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input 
                            type="email" 
                            id="email" 
                            required
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl input-focus outline-none transition-all font-bold text-slate-900"
                            placeholder="admin@secureauth.com"
                        >
                    </div>
                </div>
                
                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">
                        System Token
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="key" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            required
                            class="w-full pl-12 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-2xl input-focus outline-none transition-all font-bold text-slate-900"
                            placeholder="••••••••••••"
                        >
                    </div>
                </div>
                
                <!-- Error Alert -->
                <div id="errorAlert" class="hidden bg-rose-50 border border-rose-100 text-rose-600 px-5 py-4 rounded-2xl text-sm font-bold flex items-center">
                    <i data-lucide="alert-circle" class="w-5 h-5 mr-3 flex-shrink-0"></i>
                    <span id="errorMessage"></span>
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full bg-cuz-blue hover:bg-cuz-blue-light text-white py-5 rounded-2xl font-black uppercase tracking-widest btn-scale transition-all flex items-center justify-center shadow-lg shadow-cuz-blue/20"
                >
                    <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">Initiate Secure Login</span>
                </button>
            </form>
            
            <!-- Success State -->
            <div id="successSection" class="hidden text-center py-4">
                <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="shield-check" class="w-10 h-10 text-emerald-600"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-900 mb-2">Access Granted</h3>
                <p class="text-slate-500 mb-6 font-medium">Verified system administrator.</p>
                <div class="flex justify-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-4 border-slate-100 border-t-cuz-blue"></div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-8">
            <a href="index.html" class="text-slate-500 hover:text-white transition-colors text-xs font-black uppercase tracking-widest flex items-center justify-center">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                Back to Public Terminal
            </a>
        </div>
    </div>

    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');
            
            errorAlert.classList.add('hidden');
            loginBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            btnText.textContent = 'Verifying...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('tempToken', data.tempToken);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('adminMode', 'true');
                    
                    document.getElementById('adminLoginForm').classList.add('hidden');
                    document.getElementById('successSection').classList.remove('hidden');
                    
                    setTimeout(() => {
                        window.location.href = 'verify.html';
                    }, 1500);
                } else {
                    errorMessage.textContent = data.message || 'Access Denied';
                    errorAlert.classList.remove('hidden');
                    errorAlert.classList.add('shake');
                    setTimeout(() => errorAlert.classList.remove('shake'), 500);
                    loginBtn.disabled = false;
                    loadingSpinner.classList.add('hidden');
                    btnText.textContent = 'Initiate Secure Login';
                }
            } catch (error) {
                errorMessage.textContent = 'Connection failed';
                errorAlert.classList.remove('hidden');
                loginBtn.disabled = false;
                loadingSpinner.classList.add('hidden');
                btnText.textContent = 'Initiate Secure Login';
            }
        });
    </script>
</body>
</html>
