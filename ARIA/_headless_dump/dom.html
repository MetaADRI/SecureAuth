    radial-gradient(ellipse 70% 50% at 80% 70%, rgba(79, 209, 255, 0.07), transparent 50%);

.orb-field__stage {
  position: absolute;
  inset: -5%;
  transform-style: preserve-3d;
  will-change: transform;
}

.orb-field__orbs {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;

.orb {
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 50%;
  transform-style: preserve-3d;
  will-change: transform, opacity, filter;
  /* volume: rim + glow sold via inline styles in JS */
  mix-blend-mode: screen;
}

.orb--layer-0 {
  z-index: 3;
}

.orb--layer-1 {
  z-index: 2;
}

.orb--layer-2 {
  z-index: 1;
}

.orb-field__vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 75% 70% at 50% 45%, transparent 30%, rgba(5, 8, 16, 0.75) 100%);
  z-index: 4;
}

  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  transform: perspective(900px) scale(1.08) !important;
